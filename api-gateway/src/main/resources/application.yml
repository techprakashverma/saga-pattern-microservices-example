server:
  port: 8079

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: order-ms
            uri: lb://order-ms
            predicates:
              - Path=/order-ms/api/**
            filters:
              - StripPrefix=1
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
